name: React migration build

on:
  pull_request:
    paths:
      - 'react-migration/**'
      - '.github/workflows/react-migration-build.yml'
  workflow_dispatch:

jobs:
  build-react-migration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-migration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Supabase RPC smoke test
        run: node scripts/smoke-supabase.mjs
