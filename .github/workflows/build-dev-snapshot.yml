name: Build isolated DEV snapshot

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev/modular-foundation
    paths:
      - .github/workflows/build-dev-snapshot.yml
      - src/dev/**
      - tools/build_dev_snapshot.py
      - tools/enhance_dev_pwa_identity.py
      - tools/validate_dev_snapshot.py
      - tools/validate_dev_pwa_identity.py

permissions:
  contents: write

concurrency:
  group: build-isolated-dev-snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build DEV artifact
        id: build
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -o pipefail
          python tools/build_dev_snapshot.py 2>&1 | tee /tmp/01-build.log

      - name: Apply distinct DEV PWA identity
        id: identity
        if: steps.build.outcome == 'success'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -o pipefail
          python tools/enhance_dev_pwa_identity.py 2>&1 | tee /tmp/02-identity.log

      - name: Validate DEV artifact and modules
        id: validate
        if: steps.build.outcome == 'success' && steps.identity.outcome == 'success'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -o pipefail
          python tools/validate_dev_snapshot.py 2>&1 | tee /tmp/03-validate.log

      - name: Validate distinct DEV PWA identity
        id: validate_identity
        if: steps.build.outcome == 'success' && steps.identity.outcome == 'success'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -o pipefail
          python tools/validate_dev_pwa_identity.py 2>&1 | tee /tmp/04-validate-identity.log

      - name: Verify PROD files remain untouched
        id: isolation
        if: steps.build.outcome == 'success' && steps.identity.outcome == 'success'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        run: |
          set -o pipefail
          changed="$(git diff --name-only)"
          printf '%s\n' "$changed" | tee /tmp/05-isolation.log
          if printf '%s\n' "$changed" | grep -Ev '^(dev/)' | grep -q .; then
            echo 'El build intentó modificar archivos fuera de dev/' | tee -a /tmp/05-isolation.log >&2
            exit 1
          fi

      - name: Save branch diagnostic without publishing
        if: >-
          github.ref != 'refs/heads/main' &&
          (steps.build.outcome != 'success' ||
           steps.identity.outcome != 'success' ||
           steps.validate.outcome != 'success' ||
           steps.validate_identity.outcome != 'success' ||
           steps.isolation.outcome != 'success')
        run: |
          mkdir -p diagnostics
          {
            echo "commit=${GITHUB_SHA}"
            echo "validated_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for file in /tmp/01-build.log /tmp/02-identity.log /tmp/03-validate.log /tmp/04-validate-identity.log /tmp/05-isolation.log; do
              if [ -f "$file" ]; then
                echo
                echo "===== $(basename "$file") ====="
                cat "$file"
              fi
            done
          } > diagnostics/dev-modular-last-build.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/dev-modular-last-build.log
          git commit -m 'dev: capture modular build diagnostic [skip ci]' || exit 0
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Certify branch validation
        if: >-
          github.ref != 'refs/heads/main' &&
          steps.build.outcome == 'success' &&
          steps.identity.outcome == 'success' &&
          steps.validate.outcome == 'success' &&
          steps.validate_identity.outcome == 'success' &&
          steps.isolation.outcome == 'success'
        run: |
          mkdir -p diagnostics
          cat > diagnostics/dev-modular-validation.json <<EOF
          {
            "status": "PASS",
            "environment": "DEV",
            "architecture": "modular-foundation",
            "validated_commit": "${GITHUB_SHA}",
            "validated_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "published": false,
            "prod_modified": false
          }
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add diagnostics/dev-modular-validation.json
          git commit -m 'dev: certify modular foundation validation [skip ci]'
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Commit isolated DEV artifact
        if: >-
          github.ref == 'refs/heads/main' &&
          steps.build.outcome == 'success' &&
          steps.identity.outcome == 'success' &&
          steps.validate.outcome == 'success' &&
          steps.validate_identity.outcome == 'success' &&
          steps.isolation.outcome == 'success'
        run: |
          if git diff --quiet -- dev/; then
            echo 'DEV ya estaba actualizado'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dev/
          git commit -m 'dev: publish modular isolated snapshot [skip ci]'
          git push origin HEAD:main
